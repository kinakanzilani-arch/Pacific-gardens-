<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Pacific Gardens</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to bottom, #007BFF, #66b3ff);
            color: white;
            text-align: center;
        }
        header {
            background-color: #0056b3;
            padding: 20px;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }
        .content {
            padding: 30px;
        }
        .box {
            background-color: rgba(255, 255, 255, 0.15);
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
        }
        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        footer {
            background-color: #0056b3;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>Contact Us</h1>
    <nav>
        <a href="Home.html">Home</a>
        <a href="About.html">About</a>
        <a href="Contact.html">Contact</a>
    </nav>
</header>

<div class="content">

    <div class="box">
        <h2>Get in Touch</h2>
        <p>We would love to hear from you!</p>

        <p>📞 Phone: 0712345678</p>
        <p>📧 Email: info@pacificgardens.com</p>
        <p>📍 Location: Nairobi, Kenya</p>
    </div>

    <div class="box">
        <h2>Send a Message</h2>

        <form>
            <input type="text" placeholder="Your Name" required><br>
            <input type="email" placeholder="Your Email" required><br>
            <textarea rows="5" placeholder="Your Message"></textarea><br>
            <button type="submit">Send</button>
        </form>
    </div>

</div>

<footer>
    <p>&copy; 2026 Pacific Gardens. All rights reserved.</p>
</footer>

</body>
</html>
